name: release

# Fires when release-plz creates a GitHub Release. Builds and attaches
# the Linux x86_64 and aarch64 tarballs as release assets.
#
# Flatpak builds live in release-flatpak.yml (same trigger) so a
# Flatpak failure doesn't sink the tarball builds and the manifest
# can be validated against an arbitrary ref via workflow_dispatch.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)build binaries for'
        required: true

jobs:
  linux-x86_64-tarball:
    name: "Linux x86_64 tarball"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtk4-layer-shell-dev \
            libwayland-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build tarball
        run: make ARCH=x86_64 package

      - name: Attach tarball to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: tensaku-${{ github.event.release.tag_name || inputs.tag }}-x86_64.tar.gz

  linux-aarch64-tarball:
    name: "Linux aarch64 tarball"
    # ubuntu-24.04-arm is the native aarch64 runner; apt deps match
    # the x86_64 job above.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Install native deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtk4-layer-shell-dev \
            libwayland-dev \
            make

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build tarball
        run: make ARCH=aarch64 package

      - name: Attach tarball to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: tensaku-${{ github.event.release.tag_name || inputs.tag }}-aarch64.tar.gz
