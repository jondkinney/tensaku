name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Publish the crates and cut the tag + GitHub Release once the
  # release PR is merged. The Release fires `release: published`,
  # which the packaging workflows (Flatpak, AUR) build on.
  release:
    name: release-plz release
    runs-on: ubuntu-latest
    # Fedora-based gtk4-rs container — see ci.yml for rationale.
    container:
      image: ghcr.io/gtk-rs/gtk4-rs/gtk4:latest
    steps:
      - name: Install native deps + gh CLI
        # gh is needed by release-plz/action to look up the GitHub
        # viewer's name/email for git authoring; the gtk-rs container
        # doesn't ship it.
        run: yum install -y gtk4-devel libadwaita-devel gtk4-layer-shell-devel wayland-devel gh
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git safe directory
        # Containerized job: workspace is owned by a different uid
        # than the in-container root, so git refuses to operate on it
        # without this exception.
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Keep the release PR (version bump + CHANGELOG) up to date on
  # every push to main.
  release-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gtk-rs/gtk4-rs/gtk4:latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    steps:
      - name: Install native deps + gh CLI
        run: yum install -y gtk4-devel libadwaita-devel gtk4-layer-shell-devel wayland-devel gh
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
