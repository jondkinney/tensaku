name: CI

# Per-PR safety net: fmt + clippy + test. Linux-only because tensaku
# itself is Linux-only. Release-time builds live in release.yml; this
# is the pre-merge gate that keeps main green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  check:
    name: clippy + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install native deps
        # Same set the release.yml linux-aarch64 job installs; brings
        # tensaku in line with how mousehop and vernier wire up GTK
        # builds (apt directly on the runner, no container).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtk4-layer-shell-dev \
            libwayland-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features
