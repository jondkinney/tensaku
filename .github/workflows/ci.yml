name: CI

# Per-PR safety net: fmt + clippy + test. Linux x86_64-only because
# tensaku itself targets Linux x86_64 (the gtk4-layer-shell C library
# isn't packaged on Ubuntu — see release.yml note). Release-time
# builds live in release.yml; this is the pre-merge gate that keeps
# main green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  check:
    name: clippy + test
    runs-on: ubuntu-latest
    # Fedora-flavored container because Ubuntu's apt repos don't carry
    # libgtk4-layer-shell-dev — `gtk4-layer-shell-devel` exists on
    # Fedora (and so in this image). Matches the gtk4-rs project's
    # own CI setup. Same container the release.yml Linux build uses
    # so CI and release see identical toolchain + system libs.
    container:
      image: ghcr.io/gtk-rs/gtk4-rs/gtk4:latest
    steps:
      - name: Install native deps
        run: yum install -y gtk4-devel libadwaita-devel gtk4-layer-shell-devel wayland-devel
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features
