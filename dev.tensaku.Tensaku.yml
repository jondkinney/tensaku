app-id: dev.tensaku.Tensaku
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: tensaku
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/tensaku/cargo
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    RUSTFLAGS: -C link-arg=-Wl,-z,now
finish-args:
  # Wayland support; fallback-x11 only grants X11 access when
  # Wayland isn't available — tighter than --socket=x11.
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # File access
  - --filesystem=home
  - --filesystem=xdg-config/tensaku:ro
  - --filesystem=xdg-data/tensaku:rw
  # Clipboard access
  - --talk-name=org.freedesktop.portal.Clipboard
  - --talk-name=org.freedesktop.portal.Secret
  # Screenshot/desktop integration
  - --talk-name=org.freedesktop.portal.Screenshot
  - --talk-name=org.freedesktop.portal.Desktop
  # Notifications
  - --talk-name=org.freedesktop.Notifications
  # Share MIME types
  - --share=ipc
  # Allow reading from stdin
  - --share=network

modules:
  # gtk4-layer-shell isn't part of the GNOME runtime; build it into /app
  # so the `gtk4-layer-shell` crate (scroll-capture overlay) can link it.
  - name: gtk4-layer-shell
    buildsystem: meson
    config-opts:
      - -Dintrospection=false
      - -Dvapi=false
    sources:
      - type: archive
        url: https://github.com/wmww/gtk4-layer-shell/archive/refs/tags/v1.3.0.tar.gz
        sha256: 1ebb01ab14e98afd1727f68f64981c37bd23305b1f131f5667c02b94cf593192
  - name: tensaku
    buildsystem: simple
    build-commands:
      - cargo build --release --locked --features ci-release
      - install -Dm755 target/release/tensaku /app/bin/tensaku
      - install -Dm644 dev.tensaku.Tensaku.desktop /app/share/applications/dev.tensaku.Tensaku.desktop
      - install -Dm644 dev.tensaku.Tensaku.metainfo.xml /app/share/metainfo/dev.tensaku.Tensaku.metainfo.xml
      - install -Dm644 assets/tensaku.svg /app/share/icons/hicolor/scalable/apps/dev.tensaku.Tensaku.svg
      # Render a hicolor PNG ladder from the source SVG so hosts
      # that prefer fixed-size raster icons (older toolkits, certain
      # KDE variants) get a sharp render without scaling the SVG at
      # runtime. rsvg-convert ships with the GNOME runtime.
      - |
        for size in 16 22 24 32 48 64 128 256 512; do
          install -d /app/share/icons/hicolor/${size}x${size}/apps
          rsvg-convert -w $size -h $size \
            assets/tensaku.svg \
            -o /app/share/icons/hicolor/${size}x${size}/apps/dev.tensaku.Tensaku.png
        done
      - install -Dm644 LICENSE /app/share/licenses/dev.tensaku.Tensaku/LICENSE
      - install -Dm644 NOTICE /app/share/licenses/dev.tensaku.Tensaku/NOTICE
      - install -Dm644 completions/tensaku.bash /app/share/bash-completion/completions/tensaku
      - install -Dm644 completions/tensaku.fish /app/share/fish/vendor_completions.d/tensaku.fish
      - install -Dm644 completions/tensaku.elv /app/share/elvish/lib/tensaku.elv
      - install -Dm644 completions/tensaku.nu /app/share/nushell/completions/tensaku.nu
      - install -Dm644 man/tensaku.1 /app/share/man/tensaku.1
      - sed -i 's|^Exec=tensaku|Exec=/app/bin/tensaku|' /app/share/applications/dev.tensaku.Tensaku.desktop
      - sed -i 's|^TryExec=tensaku|TryExec=/app/bin/tensaku|' /app/share/applications/dev.tensaku.Tensaku.desktop
    sources:
      - type: dir
        path: .
